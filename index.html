<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Prozonix | 8-Bit Merge</title>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <style>
        :root {
            --bg: #0a0a0a;
            --blue: #00d2ff;
            --green: #39ff14;
            --red: #ff3131;
            --yellow: #ffd700;
            --panel: #1a1a1a;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 10px;
            overflow-x: hidden;
        }

        /* --- 8-BIT CAR SPRITE --- */
        .car-sprite {
            position: relative;
            width: 50px;
            height: 25px;
            border-radius: 4px 4px 0 0;
            transition: all 0.3s ease;
        }

        /* The "Bump" on top */
        .car-sprite::before {
            content: '';
            position: absolute;
            top: -8px;
            left: 15px;
            width: 20px;
            height: 10px;
            background: inherit;
            border-radius: 4px 4px 0 0;
        }

        /* The "Wheels" */
        .car-sprite::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 5px;
            width: 40px;
            height: 8px;
            /* Creates two black squares for wheels */
            background: radial-gradient(circle, #000 40%, transparent 41%) 0 0/15px 100%,
                        radial-gradient(circle, #000 40%, transparent 41%) 25px 0/15px 100%;
            background-repeat: no-repeat;
        }

        .lvl-1 { background: #888; }
        .lvl-2 { background: var(--blue); box-shadow: 0 0 10px var(--blue); }
        .lvl-3 { background: var(--green); box-shadow: 0 0 10px var(--green); }
        .lvl-4 { background: var(--yellow); box-shadow: 0 0 10px var(--yellow); }

        /* --- GAME UI --- */
        #money-display { font-size: 3rem; color: var(--blue); text-shadow: 0 0 15px var(--blue); margin: 10px; }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 10px;
            padding: 15px;
            border: 5px solid var(--green);
            border-radius: 20px;
            background: #000;
        }

        .grid.locked { filter: grayscale(1) blur(3px); pointer-events: none; border-color: #444; }

        .cell {
            background: var(--panel);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #333;
        }

        .controls { width: 320px; margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
        .btn { border: none; border-radius: 10px; padding: 15px; font-weight: bold; cursor: pointer; font-family: inherit; }
        .btn-buy { background: var(--red); color: white; }
        .btn-secondary { flex: 1; background: #333; color: white; }

        /* --- WHEEL MODAL --- */
        #wheel-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 1000; flex-direction: column; align-items: center; justify-content: center;
        }

        .wheel {
            width: 280px; height: 280px; border-radius: 50%; border: 5px solid white;
            position: relative; overflow: hidden; transition: transform 4s cubic-bezier(0.1, 0, 0.2, 1);
        }

        .segment {
            position: absolute; width: 50%; height: 50%; transform-origin: bottom right;
            display: flex; align-items: center; justify-content: center; color: black; font-size: 10px; font-weight: bold; text-align: center;
        }
    </style>
</head>
<body>

    <div id="captcha-box">
        <div class="g-recaptcha" data-sitekey="6Lemvn0sAAAAAHvuSbL8cWEj7Ek8m4yXNcVgv_ZD" data-callback="verify" data-expired-callback="expire"></div>
    </div>

    <div id="money-display">$100</div>
    <div id="status" style="margin-bottom:10px; color: var(--yellow);">Verify to begin!</div>

    <div class="grid locked" id="board">
        </div>

    <div class="controls">
        <button class="btn btn-buy" onclick="buyCar()">BUY CAR ($<span id="price">10</span>)</button>
        <div style="display:flex; gap:10px;">
            <button class="btn btn-secondary" style="background:var(--yellow); color:black;" onclick="openWheel()">WHEEL</button>
            <button class="btn btn-secondary" style="background:var(--green); color:black;" id="turbo-btn">TURBO (1X)</button>
        </div>
    </div>

    <div id="wheel-overlay">
        <div class="wheel" id="wheel-disc">
            <div class="segment" style="background:var(--yellow); transform:rotate(0deg);"><span>3X TURBO</span></div>
            <div class="segment" style="background:var(--blue); transform:rotate(90deg);"><span>500 COINS</span></div>
            <div class="segment" style="background:var(--red); transform:rotate(180deg);"><span>4 CARS</span></div>
            <div class="segment" style="background:var(--green); transform:rotate(270deg);"><span>1 HR CASH</span></div>
        </div>
        <button class="btn btn-buy" style="margin-top:20px; width:200px;" onclick="spin()">SPIN ($50)</button>
        <button class="btn" style="background:none; color:white;" onclick="closeWheel()">CLOSE</button>
    </div>

    <script>
        let money = 100;
        let carCount = 0;
        let turbo = 1;
        let isHuman = false;
        let grid = Array(9).fill(0);

        // Init Grid
        const board = document.getElementById('board');
        for(let i=0; i<9; i++) {
            let c = document.createElement('div');
            c.className = 'cell';
            c.id = `cell-${i}`;
            c.onclick = () => merge(i);
            board.appendChild(c);
        }

        function verify() { isHuman = true; board.classList.remove('locked'); document.getElementById('status').innerText = "System Active"; }
        function expire() { isHuman = false; board.classList.add('locked'); document.getElementById('status').innerText = "Verification Required"; }

        function getPrice() { return Math.floor(10 * Math.pow(1.2, carCount)); }

        function buyCar() {
            if(!isHuman) return;
            let p = getPrice();
            if(money >= p) {
                let slot = grid.indexOf(0);
                if(slot !== -1) {
                    money -= p; carCount++; grid[slot] = 1; update();
                }
            }
        }

        function merge(i) {
            // Simplified merge: click cell to merge with any identical neighbor
            if(grid[i] === 0) return;
            for(let n of [i+1, i-1, i+3, i-3]) {
                if(n >= 0 && n < 9 && grid[n] === grid[i]) {
                    grid[n]++; grid[i] = 0; update(); break;
                }
            }
        }

        function update() {
            document.getElementById('money-display').innerText = `$${Math.floor(money)}`;
            document.getElementById('price').innerText = getPrice();
            grid.forEach((lvl, i) => {
                const cell = document.getElementById(`cell-${i}`);
                cell.innerHTML = lvl > 0 ? `<div class="car-sprite lvl-${lvl}"></div>` : "";
            });
        }

        // Economy Loop
        setInterval(() => {
            if(!isHuman) return;
            let income = 0;
            grid.forEach(lvl => { if(lvl > 0) income += Math.pow(1.5, lvl-1); });
            money += (income * turbo);
            update();
        }, 1000);

        // Wheel functions
        function openWheel() { document.getElementById('wheel-overlay').style.display = 'flex'; }
        function closeWheel() { document.getElementById('wheel-overlay').style.display = 'none'; }
        function spin() {
            if(money < 50) return;
            money -= 50;
            let deg = Math.floor(Math.random() * 360) + 1800;
            document.getElementById('wheel-disc').style.transform = `rotate(${deg}deg)`;
            setTimeout(() => {
                let res = deg % 360;
                if(res < 90) turbo = 3;
                else if(res < 180) money += 500;
                else if(res < 270) { /* logic for 4 cars */ }
                else { /* logic for 1 hr income */ }
                update();
                grecaptcha.reset(); expire(); // Force re-verify
            }, 4000);
        }
    </script>
</body>
</html>
