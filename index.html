<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fuse Highway / Prozonix</title>
    <style>
        :root {
            --bg: #2c3e50;
            --panel: #34495e;
            --gold: #f1c40f;
            --accent: #e67e22;
            --border-thick: 4px solid #222;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg);
            color: white;
            font-family: 'Arial', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            user-select: none; overflow-x: hidden;
        }

        /* --- HEADER --- */
        #header {
            width: 100%; background: rgba(0,0,0,0.4);
            padding: 15px 0; text-align: center;
            font-size: 28px; font-weight: 900; color: var(--gold);
            border-bottom: var(--border-thick); position: sticky; top: 0; z-index: 10;
        }

        /* --- TRACK --- */
        #track-container {
            width: 90%; max-width: 500px; height: 140px;
            margin: 20px 0; background: #7f8c8d;
            border: 8px solid #bdc3c7; border-radius: 100px;
            display: flex; justify-content: center; align-items: center;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }

        /* --- WHEEL --- */
        #wheel-area { display: flex; flex-direction: column; align-items: center; margin-bottom: 20px; }
        #wheel {
            width: 160px; height: 160px; border-radius: 50%;
            border: 6px solid #fff; position: relative;
            transition: transform 4s cubic-bezier(0.1, 0, 0.2, 1);
            background: conic-gradient(
                #f1c40f 0deg 45deg, #3498db 45deg 90deg, 
                #9b59b6 90deg 135deg, #e74c3c 135deg 180deg,
                #f1c40f 180deg 225deg, #3498db 225deg 270deg, 
                #9b59b6 270deg 315deg, #e74c3c 315deg 360deg
            );
        }
        #pointer {
            width: 0; height: 0; border-left: 15px solid transparent;
            border-right: 15px solid transparent; border-top: 20px solid #e74c3c;
            margin-bottom: -10px; z-index: 5;
        }

        /* --- GRID --- */
        #grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
            background: var(--panel); padding: 15px; border-radius: 15px; border: var(--border-thick);
        }
        .slot {
            width: 70px; height: 70px; background: rgba(0,0,0,0.2);
            border-radius: 10px; border: 2px dashed rgba(255,255,255,0.2);
            display: flex; justify-content: center; align-items: center;
        }

        /* --- SHOP --- */
        #shop-area { margin: 25px 0; text-align: center; }
        #buy-btn {
            background: var(--accent); color: white; border: none;
            border-bottom: 6px solid #d35400; padding: 15px 50px;
            font-size: 20px; font-weight: bold; border-radius: 15px; cursor: pointer;
        }
        #buy-btn:active { transform: translateY(4px); border-bottom-width: 2px; }
        #buy-btn:disabled { background: #7f8c8d; border-bottom: none; cursor: not-allowed; }

        /* --- MODALS --- */
        .modal {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(5px);
            z-index: 100; justify-content: center; align-items: center;
        }
        .modal-content {
            background: white; color: #222; padding: 30px;
            border-radius: 20px; width: 280px; text-align: center;
        }

        #settings-trigger { position: fixed; top: 15px; right: 15px; font-size: 30px; cursor: pointer; z-index: 20; }
    </style>
</head>
<body>

    <div id="settings-trigger" onclick="toggleModal('settings-modal')">⚙️</div>

    <div id="header">GOLD: <span id="gold-display">100</span> 🪙</div>

    <div id="track-container"><div style="opacity: 0.3;">RACING TRACK</div></div>

    <div id="wheel-area">
        <div id="pointer"></div>
        <div id="wheel"></div>
        <button id="spin-btn" onclick="spinWheel()" style="margin-top:10px; cursor:pointer;">SPIN (FREE: 3)</button>
        <small id="spin-timer" style="margin-top:5px; color: var(--gold);"></small>
    </div>

    <div id="grid">
        <div class="slot" id="s0"></div><div class="slot" id="s1"></div><div class="slot" id="s2"></div><div class="slot" id="s3"></div>
        <div class="slot" id="s4"></div><div class="slot" id="s5"></div><div class="slot" id="s6"></div><div class="slot" id="s7"></div>
        <div class="slot" id="s8"></div><div class="slot" id="s9"></div><div class="slot" id="s10"></div><div class="slot" id="s11"></div>
    </div>

    <div id="shop-area">
        <button id="buy-btn" onclick="buyCar()">BUY LEVEL 1<br><small id="price-display">50 🪙</small></button>
    </div>

    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <h2>SETTINGS</h2>
            <button style="background:#e74c3c; color:white; border:none; padding:10px; width:100%;" onclick="resetGame()">RESET PROGRESS</button>
            <br><br><button onclick="toggleModal('settings-modal')">CLOSE</button>
        </div>
    </div>

    <script>
        // --- GAME STATE ---
        let state = {
            gold: parseInt(localStorage.getItem('gold')) || 100,
            purchaseCount: parseInt(localStorage.getItem('purchaseCount')) || 0,
            maxLevel: parseInt(localStorage.getItem('maxLevel')) || 1,
            freeSpins: parseInt(localStorage.getItem('freeSpins')) || 3,
            lastSpinTime: parseInt(localStorage.getItem('lastSpinTime')) || 0,
            inventory: JSON.parse(localStorage.getItem('inventory')) || new Array(12).fill(null)
        };

        const CONFIG = { basePrice: 50, inflation: 1.2, tierMult: 1.8, spinCost: 125 };

        // --- CORE LOGIC ---
        function getShopLevel() { return Math.max(1, state.maxLevel - 2); }

        function getPrice() {
            let tierJump = Math.pow(CONFIG.tierMult, getShopLevel() - 1);
            let inflation = Math.pow(CONFIG.inflation, state.purchaseCount);
            return Math.floor(CONFIG.basePrice * tierJump * inflation);
        }

        function buyCar() {
            let price = getPrice();
            if (state.gold >= price) {
                let slotIdx = state.inventory.findIndex(s => s === null);
                if (slotIdx === -1) return alert("Grid Full!");
                
                state.gold -= price;
                state.purchaseCount++;
                state.inventory[slotIdx] = { level: getShopLevel() };
                updateUI();
                save();
            }
        }

        function spinWheel() {
            const wheel = document.getElementById('wheel');
            let cost = state.freeSpins > 0 ? 0 : CONFIG.spinCost;
            
            if (state.gold < cost && cost > 0) return alert("Not enough gold!");
            
            state.gold -= cost;
            if (state.freeSpins > 0) state.freeSpins--;
            if (state.freeSpins === 0 && state.lastSpinTime === 0) state.lastSpinTime = Date.now();

            let randomDeg = Math.floor(Math.random() * 360) + 1440; // 4 full spins + random
            wheel.style.transform = `rotate(${randomDeg}deg)`;
            
            save();
            updateUI();
        }

        // --- UTILS ---
        function toggleModal(id) {
            let m = document.getElementById(id);
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        }

        function save() {
            localStorage.setItem('gold', state.gold);
            localStorage.setItem('purchaseCount', state.purchaseCount);
            localStorage.setItem('maxLevel', state.maxLevel);
            localStorage.setItem('freeSpins', state.freeSpins);
            localStorage.setItem('lastSpinTime', state.lastSpinTime);
            localStorage.setItem('inventory', JSON.stringify(state.inventory));
        }

        function updateUI() {
            document.getElementById('gold-display').innerText = Math.floor(state.gold);
            document.getElementById('price-display').innerText = getPrice() + " 🪙";
            document.getElementById('buy-btn').innerHTML = `BUY LEVEL ${getShopLevel()}<br><small>${getPrice()} 🪙</small>`;
            
            let spinBtn = document.getElementById('spin-btn');
            spinBtn.innerText = state.freeSpins > 0 ? `SPIN (FREE: ${state.freeSpins})` : `SPIN (${CONFIG.spinCost} 🪙)`;
            
            state.inventory.forEach((item, i) => {
                document.getElementById(`s${i}`).innerText = item ? `🚗 L${item.level}` : "";
            });
        }

        function resetGame() { localStorage.clear(); location.reload(); }

        // Initial Load
        updateUI();
        
        // Timer Check (Every second)
        setInterval(() => {
            if (state.freeSpins < 3 && state.lastSpinTime > 0) {
                let elapsed = Date.now() - state.lastSpinTime;
                if (elapsed >= 300000) { // 5 minutes
                    state.freeSpins = 3;
                    state.lastSpinTime = 0;
                    updateUI();
                    save();
                }
            }
        }, 1000);
    </script>
</body>
</html>
