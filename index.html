<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Hub</title>
    <style>
        :root { --bg: #1a1a1a; --panel: #2d2d2d; --accent: #00ff88; }
        body { margin: 0; display: flex; height: 100vh; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; }
        
        /* Sidebar Navigation */
        nav { width: 250px; background: var(--panel); padding: 20px; border-right: 2px solid #444; }
        nav h2 { color: var(--accent); text-transform: uppercase; letter-spacing: 2px; }
        .game-link { 
            display: block; padding: 15px; margin: 10px 0; background: #3d3d3d; 
            border-radius: 8px; cursor: pointer; text-decoration: none; color: white; transition: 0.3s;
        }
        .game-link:hover { background: var(--accent); color: black; font-weight: bold; }

        /* Game Display Area */
        main { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #game-container { 
            width: 90%; height: 80%; border: 4px solid var(--panel); border-radius: 12px;
            background: #000; overflow: hidden; position: relative;
        }
        iframe { width: 100%; height: 100%; border: none; }
        .placeholder { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
    </style>
</head>
<body>

<nav>
    <h2>Game Hub</h2>
    <div class="game-link" onclick="loadGame('paper.html')">Paper.io Clone</div>
    <div class="game-link" onclick="loadGame('slowroads.html')">Slow Roads (3D)</div>
    <div class="game-link" onclick="loadGame('rps.html')">Classic Mini-Games</div>
</nav>

<main>
    <div id="game-container">
        <div id="placeholder" class="placeholder">
            <h3>Select a game to start playing</h3>
            <p>Ready to push to GitHub?</p>
        </div>
        <iframe id="game-frame" src="" style="display:none;"></iframe>
    </div>
</main>

<script>
    function loadGame(url) {
        const frame = document.getElementById('game-frame');
        const placeholder = document.getElementById('placeholder');
        
        placeholder.style.display = 'none';
        frame.style.display = 'block';
        frame.src = url;
    }
</script>

</body>
</html>
